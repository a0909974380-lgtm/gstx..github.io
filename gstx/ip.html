  <style>
    .ip-hero {
      padding: 56px 0 48px;
      background: var(--page-bg);
    }
    .ip-hero-inner {
      display: flex;
      align-items: center;
      gap: 48px;
      flex-wrap: wrap;
    }
    .ip-fig {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: linear-gradient(145deg, #8fce5c 0%, #6fa038 100%);
      box-shadow: 0 16px 32px rgba(44, 56, 41, 0.12);
      flex-shrink: 0;
    }
    .ip-hero-text h1 { margin-bottom: 12px; }
    .ip-hero-text .lead { margin: 0; }
    .ip-content { padding: 24px 0 56px; background: var(--page-bg); }
    .ip-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
    }
    .ip-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow-soft);
    }
    .ip-card h3 { font-size: 18px; margin: 0 0 8px 0; color: var(--text-primary); }
    .ip-card p { font-size: 15px; color: var(--text-secondary); margin: 0; line-height: 1.65; }
    .metaverse-cta { margin-top: 32px; }
    @media (max-width: 768px) { .ip-grid { grid-template-columns: 1fr; } }
  </style>
</head>

          <div class="ip-card">

            <p>在虚拟工坊中体验无花果从青皮到成熟的过程，了解品质与工艺。</p>
